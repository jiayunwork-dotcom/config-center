version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: config-center-postgres
    environment:
      POSTGRES_USER: config_center
      POSTGRES_PASSWORD: config_center_pass
      POSTGRES_DB: config_center
    ports:
      - "54320:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U config_center -d config_center"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: config-center-redis
    ports:
      - "63790:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: config-center-backend
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=config_center
      - DB_PASSWORD=config_center_pass
      - DB_NAME=config_center
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SERVER_PORT=8080
      - LONG_POLL_TIMEOUT=30
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: air

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: config-center-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:80/api
    depends_on:
      - backend
    command: npm run dev

  nginx:
    image: nginx:alpine
    container_name: config-center-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
